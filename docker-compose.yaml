version: '3.8'

services:
  vegitable_order_app:
    build: .
    image: svsps/vegetable-order-app:v1
    container_name: vegetable
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vegetable_order_app
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
